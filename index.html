<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Analyzer AI - Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo">Resume Analyzer AI</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">Analysis</a>
                <a href="compare.html" class="nav-link">Compare</a>
            </div>
        </nav>

        <header>
            <h1>Resume Analysis</h1>
            <p class="subtitle">Get instant AI-powered feedback on your resume</p>
        </header>

        <div class="main-card">
            <div class="upload-section">
                <div class="error-message" id="errorMessage"></div>

                <div class="input-group">
                    <label for="resumeFile">Upload Your Resume</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="resumeFile" accept=".pdf">
                        <label for="resumeFile" class="file-input-label" id="resumeLabel">
                            📄 Choose PDF File
                        </label>
                    </div>
                </div>

                <button class="analyze-btn" id="analyzeBtn">Analyze Resume</button>
            </div>

            <div class="results-section" id="resultsSection">
                <div id="resultsContent"></div>
            </div>

            <div class="empty-state" id="emptyState">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <h3>No Analysis Yet</h3>
                <p>Upload your resume to get started with AI analysis</p>
            </div>
        </div>
    </div>

const API_URL = "https://resume-analyser-geb4.onrender.com";
</script>

</body>
</html>
